on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JBR
        uses: actions/setup-java@v4
        with:
          distribution: "jetbrains"
          java-package: "jdk"
          java-version: "21"
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.1.0"

      - name: Build Release APK
        shell: bash
        run: |
          ./gradlew :app:assembleRelease

      - name: Stop Gradle Daemons
        shell: bash
        run: |
          ./gradlew -stop

      - name: Upload Android artifact (arm64-v8a release)
        uses: actions/upload-artifact@v4
        with:
          path: ./app/build/outputs/apk/release/*arm64-v8a*.apk
          name: app-android-arm64-v8a-release
          if-no-files-found: error

      - name: Upload Android artifact (armeabi-v7a release)
        uses: actions/upload-artifact@v4
        with:
          path: ./app/build/outputs/apk/release/*armeabi-v7a*.apk
          name: app-android-armeabi-v7a-release
          if-no-files-found: error

      - name: Upload Android artifact (universal release)
        uses: actions/upload-artifact@v4
        with:
          path: ./app/build/outputs/apk/release/*universal*.apk
          name: app-android-universal-release
          if-no-files-found: error

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-build-${{ github.run_number }}
          name: Main Build ${{ github.run_number }}
          generate_release_notes: true
          prerelease: true
          files: |
            ./app/build/outputs/apk/release/*arm64-v8a*.apk
            ./app/build/outputs/apk/release/*armeabi-v7a*.apk
            ./app/build/outputs/apk/release/*universal*.apk
